<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Management | Digitcom India Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="kitting.html">Site Kitting</a>
                <a href="teams.html">Team Management</a>
                <a href="route-planning.html">Route Planning</a>
                <a href="audit.html">Site Audit & ATP</a>
                <a href="expenses.html">Field Expenses</a>
                <a href="reconciliation.html">Logistics Reconciliation</a>
                <a href="warehouse.html" class="active">Warehouse</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Warehouse Logistics</h1>
            
            <section class="form-card">
                <h3>Log Incoming Material (MIN)</h3>
                <form id="material-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Assigned Site ID</label>
                            <select id="site-select" required style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                                <option value="">Select a Site</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Equipment Name</label>
                            <input type="text" id="equip-name" placeholder="e.g. RRU, Antenna" required style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                        </div>
                        <div class="form-group">
                            <label>Serial Number</label>
                            <input type="text" id="serial" placeholder="Unique Serial" required style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                        </div>
                        <div class="form-group">
                            <label>Jio MIN Number</label>
                            <input type="text" id="min-no" placeholder="MIN Record ID" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd;">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" style="margin-top:20px;">Register Material</button>
                    <div id="msg" style="margin-top:10px;"></div>
                </form>
            </section>

            <section class="data-table-container" style="background:#fff; padding:20px; border-radius:12px;">
                <h3>Recent Shipments</h3>
                <table style="width:100%; border-collapse:collapse;">
                    <thead>
                        <tr style="border-bottom:2px solid #eee;">
                            <th style="padding:10px; text-align:left;">Serial No</th>
                            <th style="padding:10px; text-align:left;">Site</th>
                            <th style="padding:10px; text-align:left;">Equipment</th>
                            <th style="padding:10px; text-align:left;">Status</th>
                        </tr>
                    </thead>
                    <tbody id="materials-table"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        async function initWarehouse() {
            const token = localStorage.getItem('token');
            
            // Fetch Sites for the dropdown
            const siteRes = await fetch(`${API_URL}/logistics/sites`, { headers: { 'Authorization': `Bearer ${token}` } });
            const sites = await siteRes.json();
            const select = document.getElementById('site-select');
            select.innerHTML += sites.map(s => `<option value="${s.id}">${s.site_id}</option>`).join('');

            // Fetch materials
            const matRes = await fetch(`${API_URL}/logistics/materials`, { headers: { 'Authorization': `Bearer ${token}` } });
            const materials = await matRes.json();
            document.getElementById('materials-table').innerHTML = materials.map(m => `
                <tr style="border-bottom:1px solid #f9f9f9;">
                    <td style="padding:10px;">${m.serial_number}</td>
                    <td style="padding:10px;">${m.site.site_id}</td>
                    <td style="padding:10px;">${m.equipment_name}</td>
                    <td style="padding:10px;">${m.status}</td>
                </tr>
            `).join('');
        }

        document.getElementById('material-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const body = {
                site_id: document.getElementById('site-select').value,
                equipment_name: document.getElementById('equip-name').value,
                serial_number: document.getElementById('serial').value,
                jio_min: document.getElementById('min-no').value
            };
            
            const res = await fetch(`${API_URL}/logistics/materials`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(body)
            });
            
            if (res.ok) {
                document.getElementById('msg').innerHTML = '<span style="color:green;">Log successful!</span>';
                initWarehouse();
            } else {
                document.getElementById('msg').innerHTML = '<span style="color:red;">Error logging material.</span>';
            }
        });

        initWarehouse();
    </script>
</body>
</html>
