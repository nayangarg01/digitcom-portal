<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitcom Portal - Site Audit & ATP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
    <style>
        .audit-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .upload-section {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .upload-box {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            text-align: center;
        }
        .upload-box h4 { margin-top: 0; }
        .btn-upload {
            background: var(--primary-color);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="kitting.html">Site Kitting</a>
                <a href="teams.html">Team Management</a>
                <a href="route-planning.html">Route Planning</a>
                <a href="audit.html" class="active">Site Audit & ATP</a>
                <a href="expenses.html">Field Expenses</a>
                <a href="reconciliation.html">Logistics Reconciliation</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1>Site Audit & ATP Repository</h1>
                <div class="user-info">Admin User</div>
            </header>

            <div id="sitesList">
                <!-- Site cards will be injected here -->
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        document.addEventListener('DOMContentLoaded', async () => {
            loadSites();
        });

        async function loadSites() {
            try {
                const response = await fetch(`${API_URL}/logistics/sites`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const sites = await response.json();
                const container = document.getElementById('sitesList');
                container.innerHTML = '';

                sites.forEach(site => {
                    const card = document.createElement('div');
                    card.className = 'audit-card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3 style="margin: 0;">${site.site_id} - ${site.work_type}</h3>
                            <span class="status-pill status-${site.status.toLowerCase()}">${site.status}</span>
                        </div>
                        <div class="upload-section">
                            <div class="upload-box">
                                <h4>Work Permit</h4>
                                ${site.work_permit_url ? `<a href="${API_URL.replace('/api', '')}${site.work_permit_url}" target="_blank">View Permit</a>` : '<span style="color:#999">Not Uploaded</span>'}
                                <input type="file" id="permit-${site.id}" style="display:none" onchange="handleUpload('${site.id}', 'PERMIT')">
                                <br><label for="permit-${site.id}" class="btn-upload">Upload File</label>
                            </div>
                            <div class="upload-box">
                                <h4>ATP 11A</h4>
                                ${site.atp_11a_url ? `<a href="${API_URL.replace('/api', '')}${site.atp_11a_url}" target="_blank">View 11A</a>` : '<span style="color:#999">Not Uploaded</span>'}
                                <input type="file" id="atp11a-${site.id}" style="display:none" onchange="handleUpload('${site.id}', 'ATP_11A')">
                                <br><label for="atp11a-${site.id}" class="btn-upload">Upload Photo</label>
                            </div>
                            <div class="upload-box">
                                <h4>ATP 11C</h4>
                                ${site.atp_11c_url ? `<a href="${API_URL.replace('/api', '')}${site.atp_11c_url}" target="_blank">View 11C</a>` : '<span style="color:#999">Not Uploaded</span>'}
                                <input type="file" id="atp11c-${site.id}" style="display:none" onchange="handleUpload('${site.id}', 'ATP_11C')">
                                <br><label for="atp11c-${site.id}" class="btn-upload">Upload Photo</label>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load sites:', error);
            }
        }

        async function handleUpload(siteId, type) {
            const inputId = type === 'PERMIT' ? `permit-${siteId}` : type === 'ATP_11A' ? `atp11a-${siteId}` : `atp11c-${siteId}`;
            const fileInput = document.getElementById(inputId);
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('site_id', siteId);
            formData.append('type', type);
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(`${API_URL}/documents/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: formData
                });

                if (response.ok) {
                    alert(`${type} uploaded successfully!`);
                    loadSites();
                } else {
                    alert('Upload failed');
                }
            } catch (error) {
                console.error('Upload Error:', error);
            }
        }
    </script>
</body>
</html>
