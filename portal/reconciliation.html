<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Reconciliation | Digitcom India Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="kitting.html">Site Kitting</a>
                <a href="teams.html">Team Management</a>
                <a href="route-planning.html">Route Planning</a>
                <a href="audit.html">Site Audit & ATP</a>
                <a href="expenses.html">Field Expenses</a>
                <a href="reconciliation.html" class="active">Logistics Reconciliation</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>Material Reconciliation</h1>
            <p>Match Incoming MIN with Returned MRN serials.</p>

            <div class="data-table-container" style="margin-top: 20px;">
                <div class="match-row" style="font-weight: bold; border-bottom: 2px solid #333;">
                    <span>Equipment / Serial</span>
                    <span>JIO MIN</span>
                    <span>JIO MRN</span>
                    <span>Status</span>
                    <span>Action</span>
                </div>
                <div id="reconciliationList">
                    <!-- Data will load here -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        const token = localStorage.getItem('token');

        async function loadReconciliationData() {
            try {
                const res = await fetch(`${API_URL}/logistics/materials`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const materials = await res.json();
                const list = document.getElementById('reconciliationList');
                list.innerHTML = '';

                materials.forEach(m => {
                    const isMatched = m.jio_min && m.jio_mrn;
                    const row = document.createElement('div');
                    row.className = 'match-row';
                    row.innerHTML = `
                        <span><strong>${m.equipment_name}</strong><br><small>${m.serial_number}</small></span>
                        <span>${m.jio_min || '---'}</span>
                        <span>${m.jio_mrn || '<span style="color:red">Missing</span>'}</span>
                        <span><span class="status-tag ${isMatched ? 'status-matched' : 'status-missing'}">${isMatched ? 'MATCHED' : m.status}</span></span>
                        <span>
                            ${!isMatched ? `<button class="btn-recon" onclick="updateMRN('${m.id}')">Add MRN</button>` : 'Verified'}
                        </span>
                    `;
                    list.appendChild(row);
                });
            } catch (err) { console.error(err); }
        }

        async function updateMRN(id) {
            const mrn = prompt('Enter JIO MRN Number for return:');
            if (!mrn) return;

            try {
                const res = await fetch(`${API_URL}/logistics/materials/${id}`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status: 'RETURNED', jio_mrn: mrn })
                });

                if (res.ok) {
                    loadReconciliationData();
                } else {
                    alert('Update failed.');
                }
            } catch (err) { console.error(err); }
        }

        loadReconciliationData();
    </script>
</body>
</html>
