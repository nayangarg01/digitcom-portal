
<!DOCTYPE html>
<html>
<head>
    <title>Manual Routes: 2026-02-21</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; border-radius: 12px; }
        .legend { 
            position: fixed; top: 20px; right: 20px; background: white; 
            padding: 15px; border-radius: 12px; z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            font-family: 'Outfit', sans-serif;
            min-width: 200px;
        }
        .route-entry { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .color-box { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend" id="legend">
        <h3>Manual Routes (2026-02-21)</h3>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map');
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const routesArray = [{"name": "A", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-AHOR-ENB-9046", "lat": 25.573900555555554, "lng": 72.98846916666666, "seq": 1}, {"id": "I-RJ-AHOR-ENB-9064", "lat": 25.4699475, "lng": 72.823645, "seq": 2}, {"id": "I-RJ-AHOR-ENB-I015", "lat": 25.426217, "lng": 72.940681, "seq": 3}]}, {"name": "B", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-BHAS-ENB-I002", "lat": 25.02462, "lng": 72.479693, "seq": 1}, {"id": "I-RJ-BNML-ENB-9038", "lat": 25.0410325, "lng": 72.10153083333333, "seq": 2}]}, {"name": "C", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-SNCE-ENB-I002", "lat": 24.922776, "lng": 71.612783, "seq": 1}, {"id": "I-RJ-SNCE-ENB-A003", "lat": 24.797353611111113, "lng": 71.52349166666667, "seq": 2}]}, {"name": "D", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-RNWR-ENB-9030", "lat": 24.7610975, "lng": 72.11590416666667, "seq": 1}, {"id": "I-RJ-RNWR-ENB-9018", "lat": 24.735872222222223, "lng": 72.26105166666666, "seq": 2}, {"id": "I-RJ-RNWR-ENB-9038", "lat": 24.62782222222222, "lng": 72.31326416666667, "seq": 3}]}, {"name": "E", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-JLOR-ENB-V001", "lat": 25.450419166666663, "lng": 72.57150388888888, "seq": 1}, {"id": "I-RJ-JAAW-ENB-9024", "lat": 25.33053222222222, "lng": 72.32369888888888, "seq": 2}, {"id": "I-RJ-JLOR-ENB-9019", "lat": 25.211463055555555, "lng": 72.49070583333334, "seq": 3}]}, {"name": "F", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-DENA-ENB-6082", "lat": 26.90875861111111, "lng": 73.9864463888889, "seq": 1}, {"id": "I-RJ-DENA-ENB-9085", "lat": 26.880899166666666, "lng": 74.24856166666667, "seq": 2}, {"id": "I-RJ-PASS-ENB-9032", "lat": 26.786584166666668, "lng": 74.56331888888889, "seq": 3}]}, {"name": "G", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-PASS-ENB-V001", "lat": 26.92019305555556, "lng": 74.71190222222222, "seq": 1}, {"id": "I-RJ-PASS-ENB-6002", "lat": 26.965700277777778, "lng": 74.69640944444444, "seq": 2}, {"id": "I-RJ-PASS-ENB-9047", "lat": 26.993015833333335, "lng": 74.77097638888888, "seq": 3}]}, {"name": "H", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-NAWW-ENB-9045", "lat": 27.09838138888889, "lng": 74.84898749999999, "seq": 1}, {"id": "I-RJ-NAWW-ENB-I019", "lat": 27.0341625, "lng": 74.93975388888889, "seq": 2}, {"id": "I-RJ-NAWW-ENB-V001", "lat": 27.037926111111112, "lng": 75.06544805555555, "seq": 3}]}, {"name": "I", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-JAAL-ENB-9012", "lat": 27.45808388888889, "lng": 74.066205, "seq": 1}, {"id": "I-RJ-DDWN-ENB-9014", "lat": 27.4487725, "lng": 74.52302666666667, "seq": 2}]}];
        const colors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
        const allBounds = [];
        const legend = document.getElementById('legend');

        routesArray.forEach((routeData, rIdx) => {
            const color = colors[rIdx % colors.length];
            const pathPoints = [];

            // Add Legend Entry
            const entry = document.createElement('div');
            entry.className = 'route-entry';
            entry.innerHTML = `<div class="color-box" style="background: ${color}"></div> <span>Route ${routeData.name} (${routeData.legs.length} sites)</span>`;
            legend.appendChild(entry);

            // Add Warehouse
            const origin = routeData.origin;
            pathPoints.push([origin.lat, origin.lng]);
            allBounds.push([origin.lat, origin.lng]);
            
            L.circleMarker([origin.lat, origin.lng], {
                radius: 8, fillColor: "#000", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1
            }).addTo(map).bindPopup(`<strong>Warehouse</strong> (Origin for Route ${routeData.name})`);

            // Add Sites
            routeData.legs.forEach(leg => {
                const pos = [leg.lat, leg.lng];
                pathPoints.push(pos);
                allBounds.push(pos);
                L.circleMarker(pos, {
                    radius: 6, fillColor: color, color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
                }).addTo(map).bindPopup(`<strong>Manual Route ${routeData.name}</strong><br>Stop ${leg.seq}<br>Site: ${leg.id}`);
            });

            // Draw Line
            L.polyline(pathPoints, { 
                color: color, weight: 3, opacity: 0.6, dashArray: '10, 5' 
            }).addTo(map);
        });

        if (allBounds.length > 0) {
            map.fitBounds(L.latLngBounds(allBounds), { padding: [50, 50] });
        }
    </script>
</body>
</html>
