<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitcom Portal - Field Expenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
    <style>
        .expense-form-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            margin-bottom: 40px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; color: var(--text-dark); }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }
        .table-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; color: var(--text-light); }
        td { padding: 15px; border-bottom: 1px solid #f9f9f9; }
    </style>
</head>
<body>
    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="kitting.html">Site Kitting</a>
                <a href="teams.html">Team Management</a>
                <a href="route-planning.html">Route Planning</a>
                <a href="audit.html">Site Audit & ATP</a>
                <a href="expenses.html" class="active">Field Expenses</a>
                <a href="reconciliation.html">Logistics Reconciliation</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1>Field Expense Tracker</h1>
                <div class="user-info">Admin User</div>
            </header>

            <div class="expense-form-card">
                <h3 style="margin-top: 0;">Log Site Expense</h3>
                <form id="expenseForm">
                    <div class="form-group">
                        <label>Target Site</label>
                        <select id="siteSelect" required>
                            <option value="">-- Choose Site --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="Diesel">Diesel</option>
                            <option value="Toll">Toll</option>
                            <option value="KM Result">KM Result</option>
                            <option value="Material">Local Material</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="amount" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Log Expense</button>
                </form>
            </div>

            <div class="table-container">
                <h3 style="margin-top: 0;">Recent Expenses</h3>
                <table id="expensesTable">
                    <thead>
                        <tr>
                            <th>Site</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>Description</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="expensesBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!checkAuth()) return;
            await loadSites();
            await loadExpenses();
        });

        async function loadSites() {
            try {
                const response = await fetch('http://localhost:3000/api/logistics/sites', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const sites = await response.json();
                const select = document.getElementById('siteSelect');
                sites.forEach(site => {
                    const opt = document.createElement('option');
                    opt.value = site.id;
                    opt.textContent = site.site_id;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function loadExpenses() {
            try {
                const response = await fetch('http://localhost:3000/api/finance/summary', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();
                const body = document.getElementById('expensesBody');
                body.innerHTML = '';
                data.expenses.forEach(exp => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${exp.site ? exp.site.site_id : 'N/A'}</strong></td>
                        <td>${exp.category}</td>
                        <td style="color: #b91c1c; font-weight: 500;">₹${exp.amount.toLocaleString()}</td>
                        <td>${exp.description || '-'}</td>
                        <td>${new Date(exp.date).toLocaleDateString()}</td>
                    `;
                    body.appendChild(tr);
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                site_id: document.getElementById('siteSelect').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                description: document.getElementById('description').value
            };

            const response = await fetch('http://localhost:3000/api/finance/expenses', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}`
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('Expense logged!');
                loadExpenses();
                e.target.reset();
            } else {
                alert('Failed to log expense');
            }
        });
    </script>
</body>
</html>
