<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitcom Master Site Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --a6-color: #10b981;
            --a6b6-color: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 30px auto;
        }

        #search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .site-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .site-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .site-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-a6 { background: rgba(16, 185, 129, 0.2); color: var(--a6-color); }
        .badge-a6b6 { background: rgba(245, 158, 11, 0.2); color: var(--a6b6-color); }

        .site-id {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: block;
        }

        .site-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .info-label { color: var(--text-dim); }
        .info-val { font-weight: 600; }

        /* Loader */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header>
            <h1>Digitcom Master Site Dictionary</h1>
            <p style="color: var(--text-dim)">Visualizing 862 sites from the Master Tracker</p>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by Site ID, WO, or DC Number...">
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="total-sites">0</div>
                <div class="stat-label">Total Sites</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="total-a6" style="color: var(--a6-color)">0</div>
                <div class="stat-label">A6 Sites</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="total-a6b6" style="color: var(--a6b6-color)">0</div>
                <div class="stat-label">A6+B6 Sites</div>
            </div>
        </div>

        <div class="site-grid" id="site-grid">
            <!-- Site cards injected here -->
        </div>
    </div>

    <script>
        let allSites = [];

        async function init() {
            try {
                const response = await fetch('sites_data.json');
                allSites = await response.json();
                
                updateStats(allSites);
                renderSites(allSites);
                
                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                console.error("Error loading sites:", err);
            }
        }

        function updateStats(sites) {
            document.getElementById('total-sites').innerText = sites.length;
            document.getElementById('total-a6').innerText = sites.filter(s => s.activity_type === 'A6').length;
            document.getElementById('total-a6b6').innerText = sites.filter(s => s.activity_type === 'A6+B6').length;
        }

        function renderSites(sites) {
            const grid = document.getElementById('site-grid');
            grid.innerHTML = '';
            
            // Limit to first 100 for performance if list is too long, or search handles it
            const displayList = sites.slice(0, 200);

            displayList.forEach(site => {
                const card = document.createElement('div');
                card.className = 'site-card';
                
                const badgeClass = site.activity_type === 'A6' ? 'badge-a6' : 'badge-a6b6';
                
                card.innerHTML = `
                    <div class="badge ${badgeClass}">${site.activity_type}</div>
                    <span class="site-id">${site.site_id}</span>
                    <div class="site-info">
                        <div class="info-row">
                            <span class="info-label">Work Order:</span>
                            <span class="info-val">${site.wo}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">DC Number:</span>
                            <span class="info-val">${site.dc_no}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Tower Type:</span>
                            <span class="info-val">${site.tower_type}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">KM Actual:</span>
                            <span class="info-val">${site.km_actual}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allSites.filter(s => 
                s.site_id.toLowerCase().includes(term) || 
                s.wo.toLowerCase().includes(term) ||
                s.dc_no.toLowerCase().includes(term)
            );
            renderSites(filtered);
        });

        init();
    </script>
</body>
</html>
