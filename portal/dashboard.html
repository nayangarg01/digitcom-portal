<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Digitcom India Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="active">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="route-planning.html">Route Planning</a>
                <a href="billing.html">Billing Operations</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1>DPR Dashboard</h1>
                <div class="user-info">Admin User</div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <h4>Total Sites</h4>
                    <div class="value" id="total-sites">...</div>
                </div>
                <div class="stat-card">
                    <h4>Active Sites</h4>
                    <div class="value" id="active-sites">...</div>
                </div>
                <div class="stat-card">
                    <h4>Materials Kitted</h4>
                    <div class="value" id="kitted-materials">...</div>
                </div>
            </section>

            <section class="data-table-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <h3>Live Progress Report</h3>
                    <button class="btn" onclick="openAddSiteModal()" style="padding: 10px 20px; border-radius: 6px; background: var(--primary-color); color:#fff; border:none; cursor:pointer;">+ Add Site</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Site ID</th>
                            <th>Work Type</th>
                            <th>Status</th>
                            <th>Transition</th>
                            <th>Last Updated</th>
                        </tr>
                    </thead>
                    <tbody id="sites-table-body">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        checkAuth();
        
        async function fetchDashboardData() {
            const token = localStorage.getItem('token');
            try {
                // Fetch Sites
                const response = await fetch(`${API_URL}/logistics/sites`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const sites = await response.json();
                
                // Update Stats
                document.getElementById('total-sites').textContent = sites.length;
                document.getElementById('active-sites').textContent = sites.filter(s => s.status !== 'LIVE').length;
                document.getElementById('kitted-materials').textContent = sites.filter(s => s.status === 'KITTED').length;

                // Update Table
                const tbody = document.getElementById('sites-table-body');
                tbody.innerHTML = sites.map(site => `
                    <tr>
                        <td><strong>${site.site_id}</strong></td>
                        <td>${site.work_type}</td>
                        <td><span class="status-pill status-${site.status.toLowerCase()}">${site.status}</span></td>
                        <td>
                            <select onchange="updateSiteStage('${site.id}', this.value)" style="padding:5px; border-radius:4px;">
                                <option value="">Move to...</option>
                                <option value="INSTALLED">Installation Done</option>
                                <option value="INTEGRATED">Integrated</option>
                                <option value="LIVE">Go Live</option>
                            </select>
                        </td>
                        <td>${new Date(site.updatedAt).toLocaleDateString()}</td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Fetch dashboard error:', error);
            }
        }

        async function updateSiteStage(id, status) {
            if (!status) return;
            const token = localStorage.getItem('token');
            const mac = (status === 'INTEGRATED') ? prompt('Enter Site/Antenna MAC Address:') : null;

            try {
                const response = await fetch(`${API_URL}/logistics/sites/${id}/stage`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ status, mac_address: mac })
                });

                if (response.ok) {
                    alert(`Site status updated to ${status}`);
                    fetchDashboardData();
                } else {
                    alert('Failed to update status.');
                }
            } catch (error) {
                console.error('Update error:', error);
            }
        }

        fetchDashboardData();
    </script>
</body>
</html>
