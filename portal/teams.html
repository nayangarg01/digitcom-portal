<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitcom Portal - Team Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
    <style>
        .page-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .form-card { background: #fff; padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-primary { background: var(--accent); color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .team-card { background: #fff; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body>
    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo" style="width: 150px; margin-bottom: 40px; filter: brightness(0) invert(1);"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="kitting.html">Site Kitting</a>
                <a href="teams.html" class="active">Team Management</a>
                <a href="route-planning.html">Route Planning</a>
                <a href="audit.html">Site Audit & ATP</a>
                <a href="expenses.html">Field Expenses</a>
                <a href="reconciliation.html">Logistics Reconciliation</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>
        <main class="main-content">
            <h1>Team Management</h1>

        <div class="form-card">
            <h3>Add New Team</h3>
            <input type="text" id="teamName" placeholder="Sub-vendor Name (e.g., Team Alpha)">
            <input type="text" id="teamMembers" placeholder="Members (e.g., Sunil, Rohit)">
            <button class="btn-primary" onclick="createTeam()">Create Team</button>
        </div>

        <h3>Active Teams</h3>
        <div id="teamGrid" class="team-grid">
            <!-- Teams populate here -->
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');

        async function loadTeams() {
            const res = await fetch(`${API_URL}/teams`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const teams = await res.json();
            const grid = document.getElementById('teamGrid');
            grid.innerHTML = teams.map(t => `
                <div class="team-card">
                    <h4>${t.name}</h4>
                    <p style="color: #666; font-size: 0.9em;">Members: ${t.members || 'Not specified'}</p>
                    <div style="margin-top: 10px; font-size: 0.85em;">
                        <strong>Sites:</strong> ${t._count.sites} | <strong>Equipment items:</strong> ${t._count.materials}
                    </div>
                </div>
            `).join('');
        }

        async function createTeam() {
            const name = document.getElementById('teamName').value;
            const members = document.getElementById('teamMembers').value;
            if (!name) return alert('Name is required');

            const res = await fetch(`${API_URL}/teams`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ name, members })
            });

            if (res.ok) {
                document.getElementById('teamName').value = '';
                document.getElementById('teamMembers').value = '';
                loadTeams();
            } else {
                alert('Failed to create team. Name might already exist.');
            }
        }

        loadTeams();
    </script>
</body>
</html>
