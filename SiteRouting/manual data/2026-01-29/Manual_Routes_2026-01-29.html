
<!DOCTYPE html>
<html>
<head>
    <title>Manual Routes: 2026-01-29</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; border-radius: 12px; }
        .legend { 
            position: fixed; top: 20px; right: 20px; background: white; 
            padding: 15px; border-radius: 12px; z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            font-family: 'Outfit', sans-serif;
            min-width: 200px;
        }
        .route-entry { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .color-box { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="legend" id="legend">
        <h3>Manual Routes (2026-01-29)</h3>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map');
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const routesArray = [{"name": "A", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-MRTA-ENB-6001", "lat": 26.57612, "lng": 73.863, "seq": 1}, {"id": "I-RJ-MRTA-ENB-9036", "lat": 26.509060277777778, "lng": 73.94501833333334, "seq": 2}, {"id": "I-RJ-DENA-ENB-6074", "lat": 26.51477, "lng": 74.31346, "seq": 3}]}, {"name": "B", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-DENA-ENB-6083", "lat": 26.56105, "lng": 74.47147, "seq": 1}, {"id": "I-RJ-PASS-ENB-9017", "lat": 26.71598277777778, "lng": 74.59971694444444, "seq": 2}, {"id": "I-RJ-PASS-ENB-9023", "lat": 26.69541027777778, "lng": 74.62631833333333, "seq": 3}]}, {"name": "C", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-KESR-ENB-V001", "lat": 26.97268, "lng": 73.41547, "seq": 1}, {"id": "I-RJ-NGUR-ENB-I014", "lat": 27.19168722222222, "lng": 73.88610000000001, "seq": 2}]}, {"name": "D", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-DDWN-ENB-9017", "lat": 27.182126944444445, "lng": 74.40487194444445, "seq": 1}, {"id": "I-RJ-MKRN-ENB-9035", "lat": 27.12462111111111, "lng": 74.6310086111111, "seq": 2}]}, {"name": "E", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-JAAW-ENB-6003", "lat": 25.23593, "lng": 72.13494, "seq": 1}, {"id": "I-RJ-JAAW-ENB-6004", "lat": 25.22256, "lng": 72.09222, "seq": 2}, {"id": "I-RJ-SNCE-ENB-9092", "lat": 25.0629225, "lng": 71.87469999999999, "seq": 3}]}, {"name": "F", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-BORA-ENB-6003", "lat": 24.99861, "lng": 72.05461, "seq": 1}, {"id": "I-RJ-BORA-ENB-9028", "lat": 25.085258055555553, "lng": 72.17239166666667, "seq": 2}, {"id": "I-RJ-BNML-ENB-9034", "lat": 25.00635888888889, "lng": 72.30446388888889, "seq": 3}]}, {"name": "G", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-JLOR-ENB-9037", "lat": 25.33293, "lng": 72.67241, "seq": 1}, {"id": "I-RJ-BAGA-ENB-6000", "lat": 25.20187, "lng": 72.58847, "seq": 2}, {"id": "I-RJ-BNML-ENB-6004", "lat": 24.81371, "lng": 72.45611, "seq": 3}]}, {"name": "H", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-SNCE-ENB-9008", "lat": 24.832035, "lng": 71.77481888888889, "seq": 1}, {"id": "I-RJ-SNCE-ENB-9036", "lat": 24.767839444444444, "lng": 71.7101875, "seq": 2}, {"id": "I-RJ-SNCE-ENB-9076", "lat": 24.801579722222225, "lng": 71.48662472222222, "seq": 3}]}, {"name": "I", "origin": {"lat": 26.148422, "lng": 73.061378}, "legs": [{"id": "I-RJ-KDRD-ENB-6000", "lat": 24.88981, "lng": 72.09261, "seq": 1}, {"id": "I-RJ-SNCE-ENB-9107", "lat": 24.741119444444447, "lng": 71.95590972222223, "seq": 2}, {"id": "I-RJ-SNCE-ENB-9102", "lat": 24.68613388888889, "lng": 71.84848694444445, "seq": 3}]}];
        const colors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
        const allBounds = [];
        const legend = document.getElementById('legend');

        routesArray.forEach((routeData, rIdx) => {
            const color = colors[rIdx % colors.length];
            const pathPoints = [];

            // Add Legend Entry
            const entry = document.createElement('div');
            entry.className = 'route-entry';
            entry.innerHTML = `<div class="color-box" style="background: ${color}"></div> <span>Route ${routeData.name} (${routeData.legs.length} sites)</span>`;
            legend.appendChild(entry);

            // Add Warehouse
            const origin = routeData.origin;
            pathPoints.push([origin.lat, origin.lng]);
            allBounds.push([origin.lat, origin.lng]);
            
            L.circleMarker([origin.lat, origin.lng], {
                radius: 8, fillColor: "#000", color: "#fff", weight: 2, opacity: 1, fillOpacity: 1
            }).addTo(map).bindPopup(`<strong>Warehouse</strong> (Origin for Route ${routeData.name})`);

            // Add Sites
            routeData.legs.forEach(leg => {
                const pos = [leg.lat, leg.lng];
                pathPoints.push(pos);
                allBounds.push(pos);
                L.circleMarker(pos, {
                    radius: 6, fillColor: color, color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
                }).addTo(map).bindPopup(`<strong>Manual Route ${routeData.name}</strong><br>Stop ${leg.seq}<br>Site: ${leg.id}`);
            });

            // Draw Line (Darker and Thicker for better visibility)
            L.polyline(pathPoints, { 
                color: color, weight: 5, opacity: 0.9, dashArray: '10, 10' 
            }).addTo(map);
        });

        if (allBounds.length > 0) {
            map.fitBounds(L.latLngBounds(allBounds), { padding: [50, 50] });
        }
    </script>
</body>
</html>
