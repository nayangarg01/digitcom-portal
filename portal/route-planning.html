<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planning | Digitcom India Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="../new-style.css">
    <link rel="stylesheet" href="portal.css">
    <style>
        .planning-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .control-panel {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .map-container {
            height: 600px;
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .dropzone {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        .dropzone:hover, .dropzone.active {
            border-color: var(--primary-color);
            background: #fdf2f2;
        }
        .route-results {
            margin-top: 20px;
        }
        .route-card {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #ccc;
            background: #f9f9f9;
        }
        .route-1 { border-left-color: #ff4d4d; }
        .route-2 { border-left-color: #4d79ff; }
        .route-3 { border-left-color: #2eb82e; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
        .form-group select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ddd; }
        
        #map { height: 100%; width: 100%; }
        
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 600;">Generating Optimized Routes...</p>
    </div>

    <div class="portal-container">
        <aside class="sidebar">
            <div class="logo"><img src="../images/logo.jpg" alt="Digitcom Logo"></div>
            <nav class="sidebar-menu">
                <a href="dashboard.html">DPR Dashboard</a>
                <a href="site-management.html">Site Management</a>
                <a href="kitting.html">Site Kitting</a>
                <a href="teams.html">Team Management</a>
                <a href="route-planning.html" class="active">Route Planning</a>
                <a href="audit.html">Site Audit & ATP</a>
                <a href="expenses.html">Field Expenses</a>
                <a href="reconciliation.html">Logistics Reconciliation</a>
                <a href="#" onclick="logout()" style="margin-top: 50px;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-bar">
                <h1>Automated Route Planning</h1>
                <div class="user-info">Admin User</div>
            </header>

            <div class="planning-grid">
                <div class="control-panel">
                    <div class="form-group">
                        <label>Select Origin Warehouse</label>
                        <select id="origin-warehouse">
                            <option value="Jaipur - Bagru">Jaipur - Bagru</option>
                            <option value="Jodhpur - Mogra Khurd">Jodhpur - Mogra Khurd</option>
                            <option value="Lucknow - Safedabad">Lucknow - Safedabad</option>
                        </select>
                    </div>

                    <div class="dropzone" id="dropzone">
                        <input type="file" id="fileInput" hidden accept=".csv, .xlsx, .xls">
                        <div id="dropzone-text">
                            <strong>Click to Upload Site List</strong>
                            <p>.csv or .xlsx with Site ID, Lat, Lon</p>
                        </div>
                        <div id="file-info" style="display:none;">
                            <span id="filename"></span>
                        </div>
                    </div>

                    <button class="btn" id="generate-btn" style="width: 100%; padding: 12px; font-weight: 600;">Generate Dispatch Plan</button>

                    <div class="route-results" id="route-results">
                        <!-- Route summaries will appear here -->
                    </div>

                    <button class="btn" id="export-btn" style="width: 100%; margin-top: 20px; background: #2eb82e; display: none;">Export Route Plan (.CSV)</button>
                </div>

                <div class="map-container">
                    <div id="map"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/auth.js"></script>
    <script>
        checkAuth();

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const generateBtn = document.getElementById('generate-btn');
        const exportBtn = document.getElementById('export-btn');
        const loader = document.getElementById('loader');
        
        let selectedFile = null;
        let generatedRoutes = null;
        let map = L.map('map').setView([26.8139, 75.5450], 7);
        let routeLayers = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        dropzone.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                document.getElementById('dropzone-text').style.display = 'none';
                document.getElementById('file-info').style.display = 'block';
                document.getElementById('filename').textContent = selectedFile.name;
            }
        });

        generateBtn.addEventListener('click', async () => {
            if (!selectedFile) return alert('Please upload a site list first.');
            
            const originName = document.getElementById('origin-warehouse').value;
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('originName', originName);

            loader.style.display = 'flex';
            const token = localStorage.getItem('token');

            try {
                const response = await fetch(`${API_URL}/route-planning/generate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    generatedRoutes = result.routes;
                    displayRoutes(result);
                    exportBtn.style.display = 'block';
                } else {
                    alert(result.error || 'Failed to generate routes');
                }
            } catch (error) {
                console.error(error);
                alert('An error occurred during route generation.');
            } finally {
                loader.style.display = 'none';
            }
        });

        exportBtn.addEventListener('click', async () => {
            if (!generatedRoutes) return;
            
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/route-planning/export`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        routes: generatedRoutes,
                        originName: document.getElementById('origin-warehouse').value
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Dispatch_Plan.csv';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                }
            } catch (error) {
                console.error(error);
                alert('Failed to export CSV');
            }
        });

        function displayRoutes(data) {
            const resultsDiv = document.getElementById('route-results');
            resultsDiv.innerHTML = '';
            
            // Clear existing map layers
            routeLayers.forEach(layer => map.removeLayer(layer));
            routeLayers = [];

            const colors = ['#ff4d4d', '#4d79ff', '#2eb82e'];
            const warehouse = data.warehouse;

            // Add warehouse marker
            const warehouseIcon = L.icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-black.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
            const whMarker = L.marker([warehouse.lat, warehouse.lng], {icon: warehouseIcon})
                .addTo(map)
                .bindPopup(`<strong>Warehouse:</strong> ${data.origin}`)
                .openPopup();
            routeLayers.push(whMarker);

            data.routes.forEach((route, idx) => {
                const color = colors[idx];
                
                // Add to list
                const card = document.createElement('div');
                card.className = `route-card route-${idx + 1}`;
                card.innerHTML = `
                    <strong>Route ${route.routeNumber}</strong><br>
                    Distance: ${route.totalDistanceKm} km<br>
                    Stops: ${route.sites.length}<br>
                    <small>Sequence: ${route.sites.map(s => s.id).join(' → ')}</small>
                `;
                resultsDiv.appendChild(card);

                // Draw on map
                const pathPoints = [[warehouse.lat, warehouse.lng]];
                route.sites.forEach(site => {
                    pathPoints.push([site.lat, site.lng]);
                    const marker = L.circleMarker([site.lat, site.lng], {
                        radius: 6,
                        fillColor: color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map).bindPopup(`Site ID: ${site.id}<br>Route: ${route.routeNumber}`);
                    routeLayers.push(marker);
                });

                const polyline = L.polyline(pathPoints, {color: color, weight: 4, opacity: 0.7}).addTo(map);
                routeLayers.push(polyline);
            });

            // Auto-zoom to fit all routes
            const group = new L.featureGroup(routeLayers);
            map.fitBounds(group.getBounds());
        }
    </script>
</body>
</html>
